      - 'heading "3. Rendering Strategies: CSR vs SSR vs SSG vs ISR — How Do You Choose?" [level=2] [ref=e597]'
      - paragraph [ref=e598]:
        - strong [ref=e599]: "Why they ask:"
        - text: Architects must select the right rendering strategy for each product type. Getting this wrong has major SEO, performance, and cost implications.
      - paragraph [ref=e600]:
        - strong [ref=e601]: "Model Answer:"
      - table [ref=e602]:
        - rowgroup [ref=e603]:
          - row "Strategy How it works Use when" [ref=e604]:
            - columnheader "Strategy" [ref=e605]
            - columnheader "How it works" [ref=e606]
            - columnheader "Use when" [ref=e607]
        - rowgroup [ref=e608]:
          - row "CSR (Client-Side Rendering) Browser downloads JS, renders in client Dashboards, admin panels, apps behind auth" [ref=e609]:
            - cell "CSR (Client-Side Rendering)" [ref=e610]:
              - strong [ref=e611]: CSR (Client-Side Rendering)
            - cell "Browser downloads JS, renders in client" [ref=e612]
            - cell "Dashboards, admin panels, apps behind auth" [ref=e613]
          - row "SSR (Server-Side Rendering) Server renders HTML per request SEO-critical, real-time data (news feeds, social)" [ref=e614]:
            - cell "SSR (Server-Side Rendering)" [ref=e615]:
              - strong [ref=e616]: SSR (Server-Side Rendering)
            - cell "Server renders HTML per request" [ref=e617]
            - cell "SEO-critical, real-time data (news feeds, social)" [ref=e618]
          - row "SSG (Static Site Generation) HTML pre-built at build time Marketing sites, blogs, docs" [ref=e619]:
            - cell "SSG (Static Site Generation)" [ref=e620]:
              - strong [ref=e621]: SSG (Static Site Generation)
            - cell "HTML pre-built at build time" [ref=e622]
            - cell "Marketing sites, blogs, docs" [ref=e623]
          - row "ISR (Incremental Static Regeneration) Static pages revalidated on a schedule E-commerce listings, content with periodic updates" [ref=e624]:
            - cell "ISR (Incremental Static Regeneration)" [ref=e625]:
              - strong [ref=e626]: ISR (Incremental Static Regeneration)
            - cell "Static pages revalidated on a schedule" [ref=e627]
            - cell "E-commerce listings, content with periodic updates" [ref=e628]
          - row "Islands Architecture Static HTML with selective JS hydration Content-heavy pages with interactive pockets" [ref=e629]:
            - cell "Islands Architecture" [ref=e630]:
              - strong [ref=e631]: Islands Architecture
            - cell "Static HTML with selective JS hydration" [ref=e632]
            - cell "Content-heavy pages with interactive pockets" [ref=e633]
      - paragraph [ref=e634]:
        - strong [ref=e635]: "Decision framework I use:"
      - list [ref=e636]:
        - listitem [ref=e637]: Does it need SEO? → Lean toward SSR or SSG.
        - listitem [ref=e638]: Is the data real-time? → SSR or CSR with WebSockets.
        - listitem [ref=e639]: Is the data mostly static? → SSG or ISR.
        - listitem [ref=e640]: Is it behind authentication? → CSR is fine, SEO doesn't matter.
        - listitem [ref=e641]: Is the content personalized? → SSR with streaming or CSR.
        - listitem [ref=e642]: Performance on mobile critical? → Islands architecture (minimal JS shipped).
      - paragraph [ref=e643]:
        - strong [ref=e644]: "Hybrid approach (advanced answer):"
        - text: Next.js and Angular Universal (with hydration) let you mix strategies per route. A product listing page uses ISR (revalidates every 60s), a product detail page uses SSR for fresh inventory, and the dashboard uses CSR. This is the most common real-world answer at scale.
      - paragraph [ref=e645]:
        - strong [ref=e646]: "Hydration — the key concern:"
        - text: Partial hydration and resumability (Qwik's approach) are the frontier here, reducing the JS cost of making server-rendered HTML interactive. Full hydration re-executes all component logic on the client — partial hydration only hydrates interactive islands.
      - separator [ref=e647]
      - heading "4. How Do You Build and Govern a Design System?" [level=2] [ref=e648]
      - paragraph [ref=e649]:
        - strong [ref=e650]: "Why they ask:"
        - text: Architect roles are often responsible for cross-team UI consistency. Design systems are a major part of that.
      - paragraph [ref=e651]:
        - strong [ref=e652]: "Model Answer:"
      - paragraph [ref=e653]: A design system is not a component library — it's a product. It has governance, versioning, documentation, and adoption strategy.
      - paragraph [ref=e654]:
        - strong [ref=e655]: "Layers of a design system:"
      - list [ref=e656]:
        - listitem [ref=e657]:
          - strong [ref=e658]: Design Tokens
          - text: — primitive values (colors, spacing, typography, shadows) stored as JSON/CSS custom properties. Single source of truth between design and code. Framework-agnostic.
        - listitem [ref=e659]:
          - strong [ref=e660]: Core Component Library
          - text: — headless or styled atoms (Button, Input, Modal) published as an npm package. Component API follows the "pit of success" — sensible defaults, clear prop interfaces, minimal required props.
        - listitem [ref=e661]:
          - strong [ref=e662]: Pattern Library
          - text: — composed patterns (FormField, DataTable, PageHeader).
        - listitem [ref=e663]:
          - strong [ref=e664]: Documentation
          - text: — Storybook with live examples, props tables, accessibility notes, and usage guidelines.
      - paragraph [ref=e665]:
        - strong [ref=e666]: "Tech choices:"
      - list [ref=e667]:
        - listitem [ref=e668]: Storybook for development and documentation.
        - listitem [ref=e669]: Rollup or tsup for building the library.
        - listitem [ref=e670]: Semantic versioning + Changesets for release management.
        - listitem [ref=e671]: Chromatic for visual regression testing.
      - paragraph [ref=e672]:
        - strong [ref=e673]: "Component design patterns:"
      - list [ref=e674]:
        - listitem [ref=e675]:
          - text: Use compound component patterns for complex components (e.g.,
          - code [ref=e676]: <Tabs>
          - text: ","
          - code [ref=e677]: <Tabs.Panel>
          - text: ","
          - code [ref=e678]: <Tabs.Trigger>
          - text: ).
        - listitem [ref=e679]: Accessibility baked in from day one — ARIA attributes, keyboard navigation, focus management. Not an afterthought.
        - listitem [ref=e680]: Theming via CSS custom properties or a theme provider pattern.
      - paragraph [ref=e681]:
        - strong [ref=e682]: "Governance model:"
      - list [ref=e683]:
        - listitem [ref=e684]:
          - strong [ref=e685]: "Contribution model:"
          - text: Any team can propose components via RFC (Request for Comment). A small "Design System Council" reviews for consistency.
        - listitem [ref=e686]:
          - strong [ref=e687]: "Breaking changes:"
          - text: Major version bumps with migration guides and codemods.
        - listitem [ref=e688]:
          - strong [ref=e689]: "Adoption:"
          - text: Never force. Show value through better DX — faster development, fewer bugs, accessible by default.
        - listitem [ref=e690]:
          - strong [ref=e691]: Usage analytics
          - text: to understand adoption and identify unused components.
      - paragraph [ref=e692]:
        - strong [ref=e693]: "Common pitfall to mention:"
        - text: Building a design system before understanding shared patterns leads to premature abstraction. I recommend abstracting components only after they've appeared in 3+ different places (the "rule of three").
      - separator [ref=e694]
      - heading "5. How Do You Optimize Frontend Performance?" [level=2] [ref=e695]
      - paragraph [ref=e696]:
        - strong [ref=e697]: "Why they ask:"
        - text: Performance is a core responsibility at the architect level — both defining the standards and building the systems to enforce them.
      - paragraph [ref=e698]:
        - strong [ref=e699]: "Model Answer:"
      - paragraph [ref=e700]: "I group performance into three phases:"
      - paragraph [ref=e701]:
        - strong [ref=e702]: "Phase 1: Load performance (first visit)"
      - list [ref=e703]:
        - listitem [ref=e704]:
          - text: Code splitting by route (
          - code [ref=e705]: React.lazy
          - text: + dynamic
          - code [ref=e706]: import()
          - text: ).
        - listitem [ref=e707]: Tree shaking — ensure only used code is bundled.
        - listitem [ref=e708]: "Compress assets: Brotli > gzip. Minify JS/CSS."
        - listitem [ref=e709]:
          - text: "Image optimization: WebP/AVIF format, correct"
          - code [ref=e710]: srcset
          - text: ","
          - code [ref=e711]: loading="lazy"
          - text: for below-fold images.
        - listitem [ref=e712]: Critical CSS inlining — render above-fold styles synchronously.
        - listitem [ref=e713]:
          - text: Preload key resources (
          - code [ref=e714]: <link rel="preload">
          - text: for fonts, hero images).
        - listitem [ref=e715]: CDN delivery with long cache TTLs + content-hash filenames.
        - listitem [ref=e716]: SSR/SSG for faster First Contentful Paint.
      - paragraph [ref=e717]:
        - strong [ref=e718]: "Phase 2: Runtime performance (during use)"
      - list [ref=e719]:
        - listitem [ref=e720]: Avoid layout thrashing — batch DOM reads and writes.
        - listitem [ref=e721]:
          - text: Memoize expensive computations (
          - code [ref=e722]: useMemo
          - text: ","
          - code [ref=e723]: useCallback
          - text: ).
        - listitem [ref=e724]:
          - text: Virtualize long lists (
          - code [ref=e725]: react-virtual
          - text: ","
          - code [ref=e726]: TanStack Virtual
          - text: ","
          - code [ref=e727]: cdk-virtual-scroll
          - text: ).
        - listitem [ref=e728]: Debounce/throttle high-frequency events (scroll, resize, input).
        - listitem [ref=e729]:
          - text: Use
          - code [ref=e730]: requestAnimationFrame
          - text: for animations, not
          - code [ref=e731]: setTimeout
          - text: .
        - listitem [ref=e732]: Use Web Workers for CPU-heavy tasks off the main thread.
        - listitem [ref=e733]:
          - text: Use
          - code [ref=e734]: "content-visibility: auto"
          - text: for off-screen content.
      - paragraph [ref=e735]:
        - strong [ref=e736]: "Phase 3: Perceived performance"
      - list [ref=e737]:
        - listitem [ref=e738]: Skeleton screens instead of spinners — set user expectations.
        - listitem [ref=e739]: Optimistic UI updates — show result before server confirms.
        - listitem [ref=e740]:
          - text: Prefetch data on hover before navigation (
          - code [ref=e741]: router.prefetch
          - text: ).
      - paragraph [ref=e742]:
        - strong [ref=e743]: "Target metrics (Core Web Vitals):"
      - list [ref=e744]:
        - listitem [ref=e745]: LCP (Largest Contentful Paint) < 2.5s
        - listitem [ref=e746]: INP (Interaction to Next Paint) < 200ms
        - listitem [ref=e747]: CLS (Cumulative Layout Shift) < 0.1
      - paragraph [ref=e748]:
        - strong [ref=e749]: "Measurement tools I use:"
      - list [ref=e750]:
        - listitem [ref=e751]: Lighthouse and Web Vitals in CI (block PRs that degrade Core Web Vitals).
        - listitem [ref=e752]: Chrome DevTools Performance panel for runtime bottlenecks.
        - listitem [ref=e753]: Bundle analyzer (webpack-bundle-analyzer) for dependency bloat.
        - listitem [ref=e754]: Real User Monitoring (RUM) with tools like Datadog or SpeedCurve.
      - paragraph [ref=e755]: I always profile before optimizing. Data guides where I spend effort, not gut feeling.
      - separator [ref=e756]
      - heading "6. How Do You Manage State in a Complex Frontend Application?" [level=2] [ref=e757]
      - paragraph [ref=e758]:
        - strong [ref=e759]: "Why they ask:"
        - text: State management is a common source of bugs and complexity at scale. Architects must define the strategy, not just implement one library.
      - paragraph [ref=e760]:
        - strong [ref=e761]: "Model Answer:"
      - paragraph [ref=e762]:
        - text: "The most important principle:"
        - strong [ref=e763]: not all state is the same
        - text: . Mixing state types into one global store is the root cause of most complexity.
