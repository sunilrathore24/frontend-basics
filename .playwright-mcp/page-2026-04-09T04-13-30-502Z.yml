      - paragraph [ref=e800]:
        - strong [ref=e801]: "Architecture rules I enforce:"
      - list [ref=e802]:
        - listitem [ref=e803]: Prefer URL state for shareable/bookmarkable state (never put filters in Redux).
        - listitem [ref=e804]: Use TanStack Query before reaching for Redux — it handles caching, background refresh, loading/error states out of the box.
        - listitem [ref=e805]: Keep global store lean — only truly global, synchronous UI state belongs there.
        - listitem [ref=e806]: Co-locate state as close as possible to where it's used.
        - listitem [ref=e807]: Single source of truth — never duplicate the same data in multiple stores.
        - listitem [ref=e808]: Immutable updates for predictable change detection.
      - paragraph [ref=e809]:
        - strong [ref=e810]: "Advanced talking point — derived state:"
        - text: Avoid storing derived state. If
        - code [ref=e811]: fullName
        - text: can be computed from
        - code [ref=e812]: firstName + lastName
        - text: ", don't store"
        - code [ref=e813]: fullName
        - text: — compute it with a selector. Storing derived state leads to inconsistency bugs.
      - paragraph [ref=e814]:
        - strong [ref=e815]: "Angular-specific note:"
        - text: I lean on RxJS-based reactive stores (NgRx Signal Store or lightweight service-based stores with BehaviorSubjects) and Signals for synchronous UI state.
      - separator [ref=e816]
      - heading "7. How Do You Approach Accessibility (a11y) in Frontend Architecture?" [level=2] [ref=e817]
      - paragraph [ref=e818]:
        - strong [ref=e819]: "Why they ask:"
        - text: Senior roles are expected to champion accessibility, not just implement it. This tests awareness of standards, tooling, and systemic approach.
      - paragraph [ref=e820]:
        - strong [ref=e821]: "Model Answer:"
      - paragraph [ref=e822]: I treat accessibility as a non-functional requirement with the same priority as performance. "We'll add it later" is a lie — retrofitting is 3-5x more expensive than building it in.
      - paragraph [ref=e823]:
        - strong [ref=e824]: "Architectural approach:"
      - list [ref=e825]:
        - listitem [ref=e826]:
          - strong [ref=e827]: Design system as the a11y enforcement layer
          - text: — accessible-by-default components means every team gets it for free. A Button that doesn't handle focus or a Modal that doesn't trap focus should not be in the system.
        - listitem [ref=e828]:
          - strong [ref=e829]: Semantic HTML first
          - text: — use
          - code [ref=e830]: <button>
          - text: not
          - code [ref=e831]: <div onClick>
          - text: ","
          - code [ref=e832]: <nav>
          - text: not
          - code [ref=e833]: <div class="nav">
          - text: . Semantics give screen readers context for free.
        - listitem [ref=e834]:
          - strong [ref=e835]: ARIA as a last resort
          - text: "— ARIA supplements HTML, it doesn't replace it. First rule of ARIA: don't use ARIA if a native HTML element does the job. Misused ARIA is worse than no ARIA."
        - listitem [ref=e836]:
          - strong [ref=e837]: Keyboard navigation
          - text: — every interactive element must be reachable and operable via keyboard. Focus management for modals, dialogs, drawers, and route changes is critical.
        - listitem [ref=e838]:
          - strong [ref=e839]: Color contrast
          - text: — WCAG AA requires 4.5:1 for normal text, 3:1 for large text.
        - listitem [ref=e840]:
          - strong [ref=e841]: Focus indicators
          - text: — never remove
          - code [ref=e842]: :focus
          - text: outlines without providing a visible alternative.
      - paragraph [ref=e843]:
        - strong [ref=e844]: "Testing strategy:"
      - list [ref=e845]:
        - listitem [ref=e846]:
          - strong [ref=e847]: "Automated:"
          - text: axe-core in unit tests (jest-axe), axe-playwright in E2E. Catches ~30-40% of issues.
        - listitem [ref=e848]:
          - strong [ref=e849]: "Manual:"
          - text: Keyboard-only navigation test, screen reader test (NVDA/JAWS on Windows, VoiceOver on Mac).
        - listitem [ref=e850]:
          - strong [ref=e851]: "CI gate:"
          - text: Fail builds on new axe violations.
        - listitem [ref=e852]: Include accessibility acceptance criteria in every user story.
      - paragraph [ref=e853]:
        - strong [ref=e854]: "Common mistakes I watch for:"
      - list [ref=e855]:
        - listitem [ref=e856]:
          - text: Click handlers on
          - code [ref=e857]: <div>
          - text: instead of
          - code [ref=e858]: <button>
          - text: .
        - listitem [ref=e859]:
          - text: Missing
          - code [ref=e860]: alt
          - text: text or decorative images without
          - code [ref=e861]: alt=""
          - text: .
        - listitem [ref=e862]: Modals that don't trap focus.
        - listitem [ref=e863]:
          - text: Dynamic content updates not announced to screen readers (use
          - code [ref=e864]: aria-live
          - text: regions).
      - paragraph [ref=e865]:
        - strong [ref=e866]: "Standards to reference:"
        - text: WCAG 2.1 AA (and now 2.2). ARIA Authoring Practices Guide (APG) for widget patterns.
      - separator [ref=e867]
      - heading "8. How Do You Handle Security in Frontend Applications?" [level=2] [ref=e868]
      - paragraph [ref=e869]:
        - strong [ref=e870]: "Why they ask:"
        - text: Frontend security is often overlooked. Architects should know the threat model and mitigation strategies.
      - paragraph [ref=e871]:
        - strong [ref=e872]: "Model Answer:"
      - paragraph [ref=e873]: "Frontend security focuses on protecting users and data in the browser. Key threat vectors:"
      - paragraph [ref=e874]:
        - strong [ref=e875]: XSS (Cross-Site Scripting)
        - text: — most common frontend vulnerability.
      - list [ref=e876]:
        - listitem [ref=e877]:
          - text: Never use
          - code [ref=e878]: innerHTML
          - text: or
          - code [ref=e879]: dangerouslySetInnerHTML
          - text: with user-supplied data. Use
          - code [ref=e880]: textContent
          - text: .
        - listitem [ref=e881]:
          - text: React's JSX escapes by default —
          - code [ref=e882]: dangerouslySetInnerHTML
          - text: is a red flag in code reviews.
        - listitem [ref=e883]: Angular sanitizes by default — bypassing it should require explicit justification.
        - listitem [ref=e884]: Implement a strict Content Security Policy (CSP) via HTTP headers.
        - listitem [ref=e885]: Sanitize any HTML you must render (use DOMPurify).
      - paragraph [ref=e886]:
        - strong [ref=e887]: CSRF (Cross-Site Request Forgery)
      - list [ref=e888]:
        - listitem [ref=e889]:
          - text: Use
          - code [ref=e890]: SameSite
          - text: cookie attribute (
          - code [ref=e891]: Strict
          - text: or
          - code [ref=e892]: Lax
          - text: ).
        - listitem [ref=e893]: Include CSRF tokens in state-changing requests.
        - listitem [ref=e894]:
          - text: Verify
          - code [ref=e895]: Origin
          - text: header on the server.
      - paragraph [ref=e896]:
        - strong [ref=e897]: "Token/Auth storage:"
      - list [ref=e898]:
        - listitem [ref=e899]:
          - text: Never store JWTs in
          - code [ref=e900]: localStorage
          - text: — vulnerable to XSS. Prefer
          - code [ref=e901]: HttpOnly
          - text: cookies (not accessible to JS).
        - listitem [ref=e902]: If using memory-based token storage (in-app variable), implement silent token refresh.
      - paragraph [ref=e903]:
        - strong [ref=e904]: "Dependency security:"
      - list [ref=e905]:
        - listitem [ref=e906]:
          - text: Regular
          - code [ref=e907]: npm audit
          - text: in CI.
        - listitem [ref=e908]: Use Dependabot, Renovate, or Snyk for automated vulnerability PRs.
        - listitem [ref=e909]: Pin dependency versions and review before upgrading.
        - listitem [ref=e910]: Minimize dependencies — every package is an attack surface.
      - paragraph [ref=e911]:
        - strong [ref=e912]: "Sensitive data in frontend:"
      - list [ref=e913]:
        - listitem [ref=e914]: Never hardcode API keys in client-side code — they are visible to users.
        - listitem [ref=e915]: Use environment variables only for public config (build-time). Secrets go to the backend.
        - listitem [ref=e916]: Don't log sensitive data to console in production.
        - listitem [ref=e917]: Mask sensitive fields in error reporting tools.
      - paragraph [ref=e918]:
        - strong [ref=e919]: "Third-party scripts:"
      - list [ref=e920]:
        - listitem [ref=e921]: Use Subresource Integrity (SRI) for CDN scripts.
        - listitem [ref=e922]: Audit third-party scripts regularly — they are a common supply chain attack vector.
        - listitem [ref=e923]: HTTPS everywhere, HSTS headers.
        - listitem [ref=e924]:
          - text: Secure iframe embedding with
          - code [ref=e925]: sandbox
          - text: attribute and
          - code [ref=e926]: X-Frame-Options
          - text: .
      - separator [ref=e927]
      - heading "9. How Would You Set Up a CI/CD Pipeline for a Frontend Application?" [level=2] [ref=e928]
      - paragraph [ref=e929]:
        - strong [ref=e930]: "Why they ask:"
        - text: Architects define the engineering infrastructure. A good CI/CD pipeline enforces quality gates, enables fast delivery, and reduces risk.
      - paragraph [ref=e931]:
        - strong [ref=e932]: "Model Answer:"
      - paragraph [ref=e933]:
        - strong [ref=e934]: "CI Pipeline (on every PR):"
      - code [ref=e936]: 1. Install → cache node_modules (by lockfile hash) 2. Type check (tsc --noEmit) 3. Lint (ESLint + Prettier check) 4. Unit tests (Jest/Vitest) — with coverage threshold gate 5. Component / Integration tests (Testing Library) 6. Accessibility scan (axe-playwright) 7. Build (production build) 8. Bundle size check (fail if delta > threshold) 9. Lighthouse CI — performance budget checks 10. Visual regression tests (Chromatic for Storybook) 11. Preview deployment (Vercel/Netlify preview URL posted to PR)
      - paragraph [ref=e937]:
        - strong [ref=e938]: "CD Pipeline (on merge to main):"
      - code [ref=e940]: 1. All CI steps pass 2. Build production artifacts 3. Deploy to staging → run full E2E suite (Playwright) 4. Smoke tests on staging 5. Deploy to production (blue/green or canary) 6. Feature flags for gradual feature exposure 7. Synthetic monitoring check post-deploy 8. Automated rollback if error rate spikes
      - paragraph [ref=e941]:
        - strong [ref=e942]: "Key principles:"
      - list [ref=e943]:
        - listitem [ref=e944]:
          - strong [ref=e945]: Fail fast
          - text: — put the fastest checks (lint, type check) first.
        - listitem [ref=e946]:
          - strong [ref=e947]: Keep CI under 10 minutes
          - text: — parallelize, cache aggressively, run only affected tests.
        - listitem [ref=e948]:
          - strong [ref=e949]: Preview deployments
          - text: — every PR gets a live URL. Game changer for design review.
        - listitem [ref=e950]:
          - strong [ref=e951]: Feature flags
          - text: — decouple deployment from release. Deploy dark, enable for % of users.
        - listitem [ref=e952]:
          - strong [ref=e953]: Trunk-based development
          - text: — short-lived branches merged daily, feature flags for incomplete features.
        - listitem [ref=e954]:
          - strong [ref=e955]: Semantic versioning
          - text: automated with conventional commits (semantic-release).
        - listitem [ref=e956]:
          - strong [ref=e957]: Artifact immutability
          - text: — the same build artifact goes from staging to production.
        - listitem [ref=e958]:
          - strong [ref=e959]: Environment-specific configs
          - text: injected at build time, not hardcoded.
      - separator [ref=e960]
      - heading "10. How Do You Approach Testing in a Frontend Architecture?" [level=2] [ref=e961]
      - paragraph [ref=e962]:
        - strong [ref=e963]: "Why they ask:"
        - text: Architect-level candidates are expected to define the testing strategy, not just write tests.
      - paragraph [ref=e964]:
        - strong [ref=e965]: "Model Answer:"
      - paragraph [ref=e966]:
        - text: I follow the
        - strong [ref=e967]: Testing Trophy
        - text: "model (Kent C. Dodds), not the traditional test pyramid:"
      - code [ref=e969]: "[E2E Tests] — few, smoke tests, highest confidence [Integration Tests] — most, test features/user flows ← focus here [Unit Tests] — utilities, pure logic [Static Analysis] — TypeScript, ESLint, always on"
      - paragraph [ref=e970]: Integration tests give the best ROI — they test how components work together without being as brittle as E2E or as low-value as pure unit tests.
      - paragraph [ref=e971]:
        - strong [ref=e972]: "Testing strategy by layer:"
      - table [ref=e973]:
        - rowgroup [ref=e974]:
          - row "Layer Tool What to test" [ref=e975]:
            - columnheader "Layer" [ref=e976]
            - columnheader "Tool" [ref=e977]
            - columnheader "What to test" [ref=e978]
        - rowgroup [ref=e979]:
          - row "Static analysis TypeScript + ESLint Type errors, code style" [ref=e980]:
            - cell "Static analysis" [ref=e981]
            - cell "TypeScript + ESLint" [ref=e982]
            - cell "Type errors, code style" [ref=e983]
          - row "Unit Vitest / Jest Pure functions, utilities, reducers, custom hooks" [ref=e984]:
            - cell "Unit" [ref=e985]
            - cell "Vitest / Jest" [ref=e986]
            - cell "Pure functions, utilities, reducers, custom hooks" [ref=e987]
          - row "Component / Integration Testing Library User interactions, form flows, API mocking" [ref=e988]:
            - cell "Component / Integration" [ref=e989]
            - cell "Testing Library" [ref=e990]
            - cell "User interactions, form flows, API mocking" [ref=e991]
          - row "E2E Playwright Critical user journeys (login, checkout, core flows)" [ref=e992]:
            - cell "E2E" [ref=e993]
            - cell "Playwright" [ref=e994]
            - cell "Critical user journeys (login, checkout, core flows)" [ref=e995]
          - row "Visual regression Chromatic / Percy UI consistency across changes" [ref=e996]:
            - cell "Visual regression" [ref=e997]
            - cell "Chromatic / Percy" [ref=e998]
            - cell "UI consistency across changes" [ref=e999]
          - row "Accessibility axe-playwright / jest-axe a11y violations on key pages" [ref=e1000]:
            - cell "Accessibility" [ref=e1001]
            - cell "axe-playwright / jest-axe" [ref=e1002]
            - cell "a11y violations on key pages" [ref=e1003]
          - row "Performance Lighthouse CI Core Web Vitals regression" [ref=e1004]:
            - cell "Performance" [ref=e1005]
            - cell "Lighthouse CI" [ref=e1006]
            - cell "Core Web Vitals regression" [ref=e1007]
      - paragraph [ref=e1008]:
        - strong [ref=e1009]: "Key principles:"
      - list [ref=e1010]:
        - listitem [ref=e1011]: Test behavior, not implementation. Test what the user sees and does, not internal state.
        - listitem [ref=e1012]: Tests that break on refactors without functionality changing are a waste of time.
        - listitem [ref=e1013]:
          - text: Don't test framework behavior (does Angular's
          - code [ref=e1014]: "*ngIf"
          - text: work? Yes, it does).
        - listitem [ref=e1015]: 100% coverage is a metric, not a goal. Focus on critical paths.
      - separator [ref=e1016]
      - heading "11. How Do You Structure and Enforce Code Quality at Scale?" [level=2] [ref=e1017]
      - paragraph [ref=e1018]:
        - strong [ref=e1019]: "Why they ask:"
        - text: Architects are responsible for the technical standards the entire team follows. This tests your ability to lead without just being a gatekeeper.
      - paragraph [ref=e1020]:
        - strong [ref=e1021]: "Model Answer:"
      - paragraph [ref=e1022]: Code quality at scale requires automation — you can't rely on humans to be consistent across 20+ engineers.
      - paragraph [ref=e1023]:
        - strong [ref=e1024]: "My quality stack:"
      - list [ref=e1025]:
        - listitem [ref=e1026]:
          - strong [ref=e1027]: TypeScript
          - text: (strict mode) — type safety eliminates entire classes of bugs.
        - listitem [ref=e1028]:
          - strong [ref=e1029]: ESLint
          - text: — enforce architectural rules (no
          - code [ref=e1030]: any
          - text: ", no direct cross-feature imports, import order)."
        - listitem [ref=e1031]:
          - strong [ref=e1032]: Prettier
          - text: — formatting should never be a discussion in code review.
        - listitem [ref=e1033]:
          - strong [ref=e1034]: Husky + lint-staged
          - text: — run linting on staged files pre-commit, fail fast locally.
        - listitem [ref=e1035]:
          - strong [ref=e1036]: Conventional Commits
          - text: — standardized commit messages enable automated changelogs and semantic versioning.
      - paragraph [ref=e1037]:
        - strong [ref=e1038]: "Code review culture:"
      - list [ref=e1039]:
        - listitem [ref=e1040]: PRs should be small (< 400 lines changed). Big PRs get rubber-stamped or cause analysis paralysis.
        - listitem [ref=e1041]: Agree on what code review is for (correctness, architecture, security) vs. not for (style — that's Prettier's job).
        - listitem [ref=e1042]: I document architectural decisions as ADRs (Architecture Decision Records) so context is never lost.
      - paragraph [ref=e1043]:
        - strong [ref=e1044]: "Enforcing architecture rules with code:"
      - list [ref=e1045]:
        - listitem [ref=e1046]:
          - text: Use
          - code [ref=e1047]: eslint-plugin-boundaries
          - text: to enforce module boundaries between features.
        - listitem [ref=e1048]:
          - text: Use
          - code [ref=e1049]: dependency-cruiser
          - text: to visualize and gate dependency graphs.
        - listitem [ref=e1050]: Add architecture rules to CI — fail the build if boundaries are violated.
      - separator [ref=e1051]
      - heading "12. What Patterns Do You Use for Component Design?" [level=2] [ref=e1052]
      - paragraph [ref=e1053]:
        - strong [ref=e1054]: "Why they ask:"
        - text: Architect-level candidates should know advanced patterns beyond basic components and understand when each applies.
      - paragraph [ref=e1055]:
        - strong [ref=e1056]: "Model Answer:"
      - paragraph [ref=e1057]:
        - strong [ref=e1058]: 1. Compound Components
        - text: Groups of components that share implicit state through Context. Great for flexible, composable APIs (like
        - code [ref=e1059]: <Select>
        - text: ","
        - code [ref=e1060]: <Tabs>
        - text: ","
        - code [ref=e1061]: <Accordion>
        - text: ).
      - code [ref=e1063]: <Tabs> <Tabs.List> <Tabs.Tab id="profile">Profile</Tabs.Tab> <Tabs.Tab id="settings">Settings</Tabs.Tab> </Tabs.List> <Tabs.Panel id="profile">...</Tabs.Panel> </Tabs>
      - paragraph [ref=e1064]:
        - strong [ref=e1065]: 2. Headless Components (most important pattern today)
        - text: Separate logic/state from rendering. Libraries like Radix UI, Headless UI, and React Aria follow this. You get the behavior (keyboard nav, ARIA, focus management) and provide your own styles.
      - code [ref=e1067]: // Radix headless dialog — all behavior is managed for you <Dialog.Root> <Dialog.Trigger>Open</Dialog.Trigger> <Dialog.Content>...</Dialog.Content> </Dialog.Root>
      - paragraph [ref=e1068]:
        - strong [ref=e1069]: 3. Container/Presenter (Smart/Dumb)
        - text: Separate data-fetching (container) from rendering (presenter). Improves testability — presenters are pure UI, easy to test in Storybook and unit tests.
      - paragraph [ref=e1070]:
        - strong [ref=e1071]: 4. Render Props / Children as Function
        - text: Inversion of control — the parent component controls rendering logic while the child controls data.
      - paragraph [ref=e1072]:
        - strong [ref=e1073]: 5. Custom Hooks as the primary abstraction unit
        - text: Any reusable stateful logic goes into a hook. This is the modern replacement for HOCs.
      - paragraph [ref=e1074]:
        - strong [ref=e1075]: "Anti-patterns to mention avoiding:"
      - list [ref=e1076]:
        - listitem [ref=e1077]: Prop drilling beyond 2 levels → use Context or state management.
        - listitem [ref=e1078]: God components (one component doing everything) → split by responsibility.
        - listitem [ref=e1079]: Over-abstraction too early → YAGNI (You Aren't Gonna Need It).
      - separator [ref=e1080]
      - heading "13. How Do You Handle Internationalization (i18n) and Localization (l10n)?" [level=2] [ref=e1081]
      - paragraph [ref=e1082]:
        - strong [ref=e1083]: "Why they ask:"
        - text: For companies with global products, i18n is an architectural concern, not a feature. Getting this wrong is expensive to fix.
      - paragraph [ref=e1084]:
        - strong [ref=e1085]: "Model Answer:"
      - paragraph [ref=e1086]: i18n needs to be baked into the architecture from the start. Retrofitting it is painful.
      - paragraph [ref=e1087]:
        - strong [ref=e1088]: "Library choice:"
        - code [ref=e1089]: react-i18next
        - text: or
        - code [ref=e1090]: FormatJS (react-intl)
        - text: for React.
        - code [ref=e1091]: ngx-translate
        - text: or Angular's built-in i18n for Angular.
        - code [ref=e1092]: vue-i18n
        - text: for Vue.
      - paragraph [ref=e1093]:
        - strong [ref=e1094]: "Key architectural decisions:"
      - paragraph [ref=e1095]:
        - strong [ref=e1096]: "1. Translation file structure:"
      - code [ref=e1098]: locales/ en/ common.json ← shared strings (Save, Cancel, Error) auth.json ← feature-specific product.json fr/ common.json
      - paragraph [ref=e1099]: Namespaced files prevent one giant file that causes merge conflicts.
      - paragraph [ref=e1100]:
        - strong [ref=e1101]: 2. Build-time vs runtime i18n
        - text: — build-time (Angular i18n) produces optimized bundles per locale but requires separate builds. Runtime (ngx-translate, react-intl) is more flexible but adds bundle size. Lazy load translations — only load the active locale's strings.
      - paragraph [ref=e1102]:
        - strong [ref=e1103]: "3. ICU message format for plurals and complex messages:"
      - code [ref=e1105]: "{count, plural, =0 {No items} one {1 item} other {{count} items}}"
      - paragraph [ref=e1106]:
        - text: Never do
        - code [ref=e1107]: "count > 1 ? 'items' : 'item'"
        - text: . This breaks for languages with complex plural rules (Russian has 3 plural forms, Arabic has 6).
      - paragraph [ref=e1108]:
        - strong [ref=e1109]: 4. Date, numbers, currencies
        - text: — never format manually. Use
        - code [ref=e1110]: Intl.DateTimeFormat
        - text: ","
        - code [ref=e1111]: Intl.NumberFormat
        - text: ", or FormatJS which wraps the Intl API."
      - paragraph [ref=e1112]:
        - strong [ref=e1113]: 5. RTL (Right-to-Left) support
        - text: — CSS Logical Properties (
        - code [ref=e1114]: margin-inline-start
        - text: instead of
        - code [ref=e1115]: margin-left
        - text: ) make RTL trivial. Set
        - code [ref=e1116]: dir="rtl"
        - text: "on"
        - code [ref=e1117]: <html>
        - text: based on locale.
      - paragraph [ref=e1118]:
        - strong [ref=e1119]: 6. Text expansion
        - text: — German text is ~30% longer than English. Design UI that accommodates this.
      - paragraph [ref=e1120]:
        - strong [ref=e1121]: 7. Pseudolocalization
        - text: — a testing technique where you replace all strings with extended fake translations (e.g.,
        - code [ref=e1122]: "[Ünïcödé Strïng Hëré!!!!]"
        - text: ). Catches layout-breaking translations and hardcoded strings before real translations arrive.
      - paragraph [ref=e1123]:
        - strong [ref=e1124]: 8. Translation workflow
        - text: — connect to a TMS (Translation Management System) like Phrase, Crowdin, or Lokalise. Automated extraction of new keys, professional translation, and CI sync. Never ask developers to manually manage translation files.
      - separator [ref=e1125]
      - heading "14. How Do You Manage Technical Debt and Architectural Evolution?" [level=2] [ref=e1126]
      - paragraph [ref=e1127]:
        - strong [ref=e1128]: "Why they ask:"
        - text: Architect roles exist long-term. They need someone who can keep a codebase healthy over years, not just build the initial architecture.
      - paragraph [ref=e1129]:
        - strong [ref=e1130]: "Model Answer:"
      - paragraph [ref=e1131]:
        - text: Technical debt is not inherently bad — sometimes it's a deliberate trade-off to ship faster. The problem is
        - strong [ref=e1132]: untracked, unmanaged debt
        - text: .
      - paragraph [ref=e1133]:
        - strong [ref=e1134]: "My framework:"
      - paragraph [ref=e1135]:
        - strong [ref=e1136]: 1. Make debt visible
      - list [ref=e1137]:
        - listitem [ref=e1138]:
          - text: Add
          - code [ref=e1139]: "// TODO(debt):"
          - text: comments with a ticket link.
        - listitem [ref=e1140]: Maintain a "tech debt backlog" as first-class tickets, not hidden in Jira comments.
        - listitem [ref=e1141]: "Track a \"debt ratio\" metric: debt tickets / total tickets. Present it to leadership quarterly."
      - paragraph [ref=e1142]:
        - strong [ref=e1143]: 2. Categorize debt
      - list [ref=e1144]:
        - listitem [ref=e1145]:
          - strong [ref=e1146]: Reckless
          - text: (we knew better) — fix ASAP.
        - listitem [ref=e1147]:
          - strong [ref=e1148]: Prudent
          - text: (deliberate trade-off) — schedule repayment with next feature touch.
        - listitem [ref=e1149]:
          - strong [ref=e1150]: Accidental
          - text: (grew organically) — refactor incrementally.
      - paragraph [ref=e1151]:
        - strong [ref=e1152]: 3. Incremental migration — the Boy Scout Rule
        - text: "\"Leave the code better than you found it.\" Every PR that touches a legacy module should include small improvements. This avoids big-bang rewrites."
      - paragraph [ref=e1153]:
        - strong [ref=e1154]: 4. Strangler Fig Pattern for major migrations
        - text: Instead of rewriting, build the new system alongside the old. Gradually route traffic to the new system, strangle the old. Works for migrating from Angular to React, from REST to GraphQL, from class components to hooks.
      - paragraph [ref=e1155]:
        - strong [ref=e1156]: 5. ADRs (Architecture Decision Records)
        - text: Every significant decision documented in
        - code [ref=e1157]: /docs/adr/
        - text: . Records the context, decision, and consequences. Prevents "why did we do this?" debates 2 years later.
      - paragraph [ref=e1158]:
        - strong [ref=e1159]: "6. Measure health with metrics:"
      - list [ref=e1160]:
        - listitem [ref=e1161]:
          - text: Cyclomatic complexity (eslint
          - code [ref=e1162]: complexity
          - text: rule)
        - listitem [ref=e1163]: Code duplication (jscpd)
        - listitem [ref=e1164]: Bundle size trends
        - listitem [ref=e1165]: Build time trends
      - separator [ref=e1166]
      - heading "15. How Do You Think About Frontend Observability and Monitoring?" [level=2] [ref=e1167]
      - paragraph [ref=e1168]:
        - strong [ref=e1169]: "Why they ask:"
        - text: Senior/architect candidates are expected to own production quality, not just development quality. Observability is often ignored in frontend.
      - paragraph [ref=e1170]:
        - strong [ref=e1171]: "Model Answer:"
      - paragraph [ref=e1172]: Frontend observability is about knowing what's happening in your app for real users, not just in your test environment.
      - paragraph [ref=e1173]:
        - strong [ref=e1174]: "Three pillars of frontend observability:"
      - paragraph [ref=e1175]:
        - strong [ref=e1176]: 1. Error Monitoring
      - list [ref=e1177]:
        - listitem [ref=e1178]: "Tool: Sentry or Datadog RUM."
        - listitem [ref=e1179]: Capture unhandled exceptions, promise rejections, and API errors.
        - listitem [ref=e1180]: Group by fingerprint to avoid noise.
        - listitem [ref=e1181]: Set up source maps so stack traces point to original source, not minified bundles.
        - listitem [ref=e1182]: Alert on error rate spikes, not just raw error count.
      - paragraph [ref=e1183]:
        - strong [ref=e1184]: 2. Performance Monitoring (Real User Monitoring — RUM)
      - list [ref=e1185]:
        - listitem [ref=e1186]: Capture Core Web Vitals (LCP, INP, CLS) from real users, by device, by geography.
        - listitem [ref=e1187]: "Synthetic monitoring: scheduled Lighthouse runs from CI to detect regressions."
        - listitem [ref=e1188]: "Tools: SpeedCurve, Datadog RUM, Google CrUX (free)."
      - paragraph [ref=e1189]:
        - strong [ref=e1190]: 3. User Analytics & Session Replay
      - list [ref=e1191]:
        - listitem [ref=e1192]: "Tools: PostHog, FullStory, LogRocket."
        - listitem [ref=e1193]: "Session replay: record user sessions to diagnose bugs and UX issues."
        - listitem [ref=e1194]: Custom events for critical flows (funnel drop-offs, form abandonment).
      - paragraph [ref=e1195]:
        - strong [ref=e1196]: "Alerting strategy:"
      - list [ref=e1197]:
        - listitem [ref=e1198]: Apdex score drop → page on-call.
        - listitem [ref=e1199]: Error rate > baseline + 2σ → Slack alert.
        - listitem [ref=e1200]: Core Web Vitals regression detected in RUM → engineering ticket auto-created.
      - paragraph [ref=e1201]:
        - strong [ref=e1202]: "Advanced: Custom Performance Marks"
      - code [ref=e1204]: performance.mark('checkout-started'); // ... checkout logic performance.mark('checkout-completed'); performance.measure('checkout-duration', 'checkout-started', 'checkout-completed');
      - paragraph [ref=e1205]: Send these to your analytics platform for custom flow performance tracking.
      - separator [ref=e1206]
      - heading "16. How Do You Approach API Design and Integration from the Frontend?" [level=2] [ref=e1207]
      - paragraph [ref=e1208]:
        - strong [ref=e1209]: "Why they ask:"
        - text: Architects regularly define contracts between frontend and backend. Understanding BFF, GraphQL, REST trade-offs is essential.
      - paragraph [ref=e1210]:
        - strong [ref=e1211]: "Model Answer:"
      - paragraph [ref=e1212]:
        - text: "The key insight:"
        - strong [ref=e1213]: the frontend's ideal data shape rarely matches what the backend provides
        - text: . Closing that gap is an architectural decision.
      - paragraph [ref=e1214]:
        - strong [ref=e1215]: "Approaches:"
      - paragraph [ref=e1216]:
        - strong [ref=e1217]: 1. BFF (Backend for Frontend)
        - text: A dedicated API layer owned by the frontend team. It aggregates multiple microservices, transforms data shapes, and serves exactly what the UI needs. Reduces over-fetching and simplifies client code. Common in large orgs (Netflix, Spotify).
      - paragraph [ref=e1218]:
        - strong [ref=e1219]: 2. REST
        - text: "Simple, cacheable, well-understood. Best for CRUD operations with predictable data shapes. Main frontend pain point: over-fetching (getting too many fields) and under-fetching (needing multiple requests for related data)."
      - paragraph [ref=e1220]:
        - strong [ref=e1221]: 3. GraphQL
        - text: "Client specifies exact data shape — no over/under-fetching. Excellent for complex, interconnected data. Trade-offs: caching is harder (POST requests), learning curve, potential for N+1 problems on the server. Use Apollo Client or urql on the frontend."
      - paragraph [ref=e1222]:
        - strong [ref=e1223]: 4. tRPC
        - text: Type-safe RPC between TypeScript frontend and backend. Zero runtime overhead for API types — types are shared directly. Game-changer for full-stack TypeScript teams.
      - paragraph [ref=e1224]:
        - strong [ref=e1225]: "Frontend integration architecture:"
      - code [ref=e1227]: Components → Services/Hooks → API Client → HTTP Layer (fetch/axios)
      - paragraph [ref=e1228]:
        - text: Components should never call
        - code [ref=e1229]: fetch
        - text: directly.
      - paragraph [ref=e1230]:
        - strong [ref=e1231]: "API client layer responsibilities:"
      - list [ref=e1232]:
        - listitem [ref=e1233]: Base URL configuration per environment.
        - listitem [ref=e1234]: Request/response interceptors (auth tokens, error handling, logging).
        - listitem [ref=e1235]: Request deduplication — don't fire the same GET twice simultaneously.
        - listitem [ref=e1236]: Retry logic with exponential backoff for transient failures.
        - listitem [ref=e1237]: Request cancellation (AbortController) on component unmount or navigation.
        - listitem [ref=e1238]: Response transformation — map API shapes to frontend models.
      - paragraph [ref=e1239]:
        - strong [ref=e1240]: "Caching strategy:"
      - list [ref=e1241]:
        - listitem [ref=e1242]: Stale-while-revalidate — show cached data immediately, refresh in background.
        - listitem [ref=e1243]: Cache invalidation on mutations — when you POST/PUT/DELETE, invalidate related queries.
        - listitem [ref=e1244]: Offline support — cache critical data in IndexedDB, sync when back online.
      - paragraph [ref=e1245]:
        - strong [ref=e1246]: "Contract management:"
      - list [ref=e1247]:
        - listitem [ref=e1248]: OpenAPI/Swagger specs to auto-generate TypeScript types and API clients.
        - listitem [ref=e1249]: Contract testing to catch breaking API changes early.
      - separator [ref=e1250]
      - heading "17. How Do You Approach Frontend Security for Auth Flows?" [level=2] [ref=e1251]
      - paragraph [ref=e1252]:
        - strong [ref=e1253]: "Why they ask:"
        - text: Auth is a common area where frontend architects make critical security decisions about token storage, OAuth flows, and session management.
      - paragraph [ref=e1254]:
        - strong [ref=e1255]: "Model Answer:"
      - paragraph [ref=e1256]:
        - strong [ref=e1257]: "Token storage — the most debated topic:"
      - table [ref=e1258]:
        - rowgroup [ref=e1259]:
          - row "Storage XSS Risk CSRF Risk Recommendation" [ref=e1260]:
            - columnheader "Storage" [ref=e1261]
            - columnheader "XSS Risk" [ref=e1262]
            - columnheader "CSRF Risk" [ref=e1263]
            - columnheader "Recommendation" [ref=e1264]
        - rowgroup [ref=e1265]:
          - row "localStorage HIGH (JS-accessible) None ❌ Avoid for sensitive tokens" [ref=e1266]:
            - cell "localStorage" [ref=e1267]:
              - code [ref=e1268]: localStorage
            - cell "HIGH (JS-accessible)" [ref=e1269]
            - cell "None" [ref=e1270]
            - cell "❌ Avoid for sensitive tokens" [ref=e1271]
          - row "sessionStorage HIGH (JS-accessible) None ❌ Avoid" [ref=e1272]:
            - cell "sessionStorage" [ref=e1273]:
              - code [ref=e1274]: sessionStorage
            - cell "HIGH (JS-accessible)" [ref=e1275]
            - cell "None" [ref=e1276]
            - cell "❌ Avoid" [ref=e1277]
          - row "HttpOnly Cookie None (JS can't read) Medium ✅ Preferred for JWTs" [ref=e1278]:
            - cell "HttpOnly Cookie" [ref=e1279]:
              - code [ref=e1280]: HttpOnly Cookie
            - cell "None (JS can't read)" [ref=e1281]
            - cell "Medium" [ref=e1282]
            - cell "✅ Preferred for JWTs" [ref=e1283]
          - row "Memory (variable) LOW None ✅ Acceptable, but lost on refresh" [ref=e1284]:
            - cell "Memory (variable)" [ref=e1285]
            - cell "LOW" [ref=e1286]
            - cell "None" [ref=e1287]
            - cell "✅ Acceptable, but lost on refresh" [ref=e1288]
      - paragraph [ref=e1289]:
        - strong [ref=e1290]: "Recommended auth architecture:"
      - list [ref=e1291]:
        - listitem [ref=e1292]:
          - text: Backend issues JWT in
          - code [ref=e1293]: HttpOnly
          - text: +
          - code [ref=e1294]: Secure
          - text: +
          - code [ref=e1295]: SameSite=Strict
          - text: cookie.
        - listitem [ref=e1296]: Frontend never touches the token directly.
        - listitem [ref=e1297]: Use a short-lived access token (15 min) + long-lived refresh token (7 days, HttpOnly cookie).
        - listitem [ref=e1298]: Implement silent refresh using a background fetch before access token expires.
      - paragraph [ref=e1299]:
        - strong [ref=e1300]: "Architecture pattern:"
      - code [ref=e1302]: AuthService → manages tokens, login/logout, refresh AuthGuard → protects routes AuthInterceptor → attaches tokens to API requests, handles 401s PermissionDirective → *hasPermission="'admin'" to show/hide UI
      - paragraph [ref=e1303]:
        - strong [ref=e1304]: "OAuth 2.0 with PKCE (for SPAs):"
        - text: For third-party OAuth (Google, GitHub), always use the Authorization Code flow with PKCE — never the implicit flow (deprecated for SPAs). PKCE adds a code verifier/challenge to prevent authorization code interception.
      - paragraph [ref=e1305]:
        - strong [ref=e1306]: "Session management:"
      - list [ref=e1307]:
        - listitem [ref=e1308]: "Implement proper logout: revoke refresh token on server, clear cookies, clear in-memory state."
        - listitem [ref=e1309]: Track active sessions (show user their active devices).
        - listitem [ref=e1310]: Implement idle timeout for sensitive applications.
      - paragraph [ref=e1311]:
        - strong [ref=e1312]: "Key principle:"
        - text: The server is the source of truth for authorization. Front-end authorization is for UX, not security. Always validate on the server — never trust the client.
      - separator [ref=e1313]
      - heading "18. How Do You Lead and Mentor a Frontend Team as an Architect?" [level=2] [ref=e1314]
      - paragraph [ref=e1315]:
        - strong [ref=e1316]: "Why they ask:"
        - text: Architect roles are not just technical. They require leadership, influence without authority, and the ability to raise team capability.
      - paragraph [ref=e1317]:
        - strong [ref=e1318]: "Model Answer:"
      - paragraph [ref=e1319]: Being a frontend architect means you multiply the team's output, not just your own. The best architects write less code and enable more.
      - paragraph [ref=e1320]:
        - strong [ref=e1321]: 1. Technical Vision & Roadmap
      - list [ref=e1322]:
        - listitem [ref=e1323]: Define the 6-month and 12-month technical roadmap aligned with business goals.
        - listitem [ref=e1324]: "Communicate it in language non-engineers understand: \"this reduces our new feature time from 3 weeks to 1 week.\""
        - listitem [ref=e1325]: Get buy-in through demos and data, not mandates.
      - paragraph [ref=e1326]:
        - strong [ref=e1327]: 2. ADRs and RFCs as decision tools
      - list [ref=e1328]:
        - listitem [ref=e1329]: Major decisions go through an RFC (Request for Comment) process — written proposal, async feedback period, then decision.
        - listitem [ref=e1330]: This scales better than meetings and creates a paper trail.
      - paragraph [ref=e1331]:
        - strong [ref=e1332]: "3. Mentoring approach:"
      - list [ref=e1333]:
        - listitem [ref=e1334]: Code review as a teaching tool — explain the why, not just what to change.
        - listitem [ref=e1335]: Pair programming for complex architectural tasks with senior engineers.
        - listitem [ref=e1336]: Tech talks and internal workshops — share knowledge across the team.
        - listitem [ref=e1337]: Identify each engineer's growth area and create opportunities (assign them as the "owner" of a meaningful initiative).
      - paragraph [ref=e1338]:
        - strong [ref=e1339]: "4. Balancing autonomy and standards:"
      - list [ref=e1340]:
        - listitem [ref=e1341]: Set guardrails, not cage bars. Define what must be consistent (design system, testing approach, folder structure) and give teams freedom on everything else.
        - listitem [ref=e1342]: "\"Paved roads\": make the right thing the easy thing. If the right pattern is also the most convenient, teams follow it naturally."
        - listitem [ref=e1343]: Build golden paths — starter templates, generators, and examples.
      - paragraph [ref=e1344]:
        - strong [ref=e1345]: "5. Scaling knowledge:"
      - list [ref=e1346]:
        - listitem [ref=e1347]: Inner source model — teams contribute to shared libraries through PRs, not requests.
        - listitem [ref=e1348]: Guilds or chapters for cross-team knowledge sharing (performance guild, accessibility guild).
        - listitem [ref=e1349]: Document tribal knowledge — runbooks, architecture diagrams, onboarding guides.
      - paragraph [ref=e1350]:
        - strong [ref=e1351]: "6. Stakeholder communication:"
      - list [ref=e1352]:
        - listitem [ref=e1353]: Translate technical debt into business impact — "this refactor will reduce our deployment time from 45 minutes to 5 minutes."
        - listitem [ref=e1354]: Build a tech radar — classify technologies as Adopt, Trial, Assess, Hold.
      - paragraph [ref=e1355]:
        - strong [ref=e1356]: "7. Metrics I track for team health:"
      - list [ref=e1357]:
        - listitem [ref=e1358]: "DORA metrics: deployment frequency, lead time, change failure rate, MTTR."
        - listitem [ref=e1359]: Developer satisfaction (quarterly surveys).
        - listitem [ref=e1360]: Onboarding time for new engineers.
      - paragraph [ref=e1361]:
        - strong [ref=e1362]: "What makes a great frontend architect:"
      - list [ref=e1363]:
        - listitem [ref=e1364]: You write code. Architects who don't code lose credibility and context.
        - listitem [ref=e1365]: You make other developers more productive, not more dependent on you.
        - listitem [ref=e1366]: You optimize for the team's long-term velocity, not short-term heroics.
      - separator [ref=e1367]
      - heading "19. How Do You Handle Browser Compatibility and Cross-Platform Challenges?" [level=2] [ref=e1368]
      - paragraph [ref=e1369]:
        - strong [ref=e1370]: "Why they ask:"
        - text: Tests understanding of progressive enhancement, polyfilling strategy, and pragmatic decision-making vs. chasing perfection.
      - paragraph [ref=e1371]:
        - strong [ref=e1372]: "Model Answer:"
      - paragraph [ref=e1373]:
        - strong [ref=e1374]: "My approach: Progressive Enhancement, not Graceful Degradation."
        - text: Build a solid baseline that works everywhere, then layer enhancements for capable browsers. Users on old browsers get a functional experience; users on modern browsers get a great one.
      - paragraph [ref=e1375]:
        - strong [ref=e1376]: "Browser support strategy:"
      - list [ref=e1377]:
        - listitem [ref=e1378]: Define a browser support matrix based on analytics data, not assumptions. If only 0.3% of your users are on IE11, don't build for it.
        - listitem [ref=e1379]:
          - text: Use
          - link "browserslist" [ref=e1380] [cursor=pointer]:
            - /url: https://browsersl.ist/
          - text: in
          - code [ref=e1381]: .browserslistrc
          - text: — drives both Babel transpilation and Autoprefixer.
        - listitem [ref=e1382]:
          - text: Use
          - code [ref=e1383]: "@supports"
          - text: in CSS for feature detection instead of browser sniffing.
      - paragraph [ref=e1384]:
        - strong [ref=e1385]: "JavaScript compatibility:"
      - list [ref=e1386]:
        - listitem [ref=e1387]: Babel transpiles modern syntax to target browsers.
        - listitem [ref=e1388]:
          - text: CoreJS for polyfilling runtime APIs (
          - code [ref=e1389]: Array.prototype.at
          - text: ","
          - code [ref=e1390]: Promise.allSettled
          - text: ).
        - listitem [ref=e1391]: "Consider the cost: heavy polyfilling = bigger bundles for all users. Consider differential serving (ES modules for modern, legacy bundle for old)."
      - paragraph [ref=e1392]:
        - strong [ref=e1393]: "CSS compatibility:"
      - list [ref=e1394]:
        - listitem [ref=e1395]: PostCSS + Autoprefixer handles vendor prefixes automatically.
        - listitem [ref=e1396]: CSS custom properties (variables) — wide support now, no polyfill needed.
        - listitem [ref=e1397]:
          - text: Container queries — check caniuse.com; use
          - code [ref=e1398]: "@supports"
          - text: if needed.
        - listitem [ref=e1399]: CSS Logical Properties for RTL support.
      - paragraph [ref=e1400]:
        - strong [ref=e1401]: "Testing cross-browser:"
      - list [ref=e1402]:
        - listitem [ref=e1403]: BrowserStack or Sauce Labs for cross-browser automated testing.
        - listitem [ref=e1404]: Test on real mobile devices (Safari on iOS is the new IE — WebKit updates are slow on iOS).
        - listitem [ref=e1405]: Playwright supports Chromium, Firefox, and WebKit — use all three in CI.
      - paragraph [ref=e1406]:
        - strong [ref=e1407]: "Mobile-specific concerns:"
      - list [ref=e1408]:
        - listitem [ref=e1409]:
          - text: "300ms tap delay on older iOS (fix:"
          - code [ref=e1410]: "touch-action: manipulation"
          - text: ).
        - listitem [ref=e1411]:
          - text: Viewport height on mobile (
          - code [ref=e1412]: 100vh
          - text: doesn't account for browser chrome — use
          - code [ref=e1413]: dvh
          - text: /
          - code [ref=e1414]: svh
          - text: CSS units).
        - listitem [ref=e1415]:
          - text: "Input zoom on iOS Safari (fix:"
          - code [ref=e1416]: "font-size: 16px"
          - text: minimum on inputs).
      - separator [ref=e1417]
      - heading "20. How Do You Make Architectural Decisions and Manage Trade-offs?" [level=2] [ref=e1418]
      - paragraph [ref=e1419]:
        - strong [ref=e1420]: "Why they ask:"
        - text: This is a leadership and maturity question. How you make decisions under uncertainty is as important as what you decide.
      - paragraph [ref=e1421]:
        - strong [ref=e1422]: "Model Answer:"
      - paragraph [ref=e1423]: Architecture is about managing trade-offs, not finding perfect solutions. Every decision sacrifices something.
      - paragraph [ref=e1424]:
        - strong [ref=e1425]: "My decision-making framework:"
      - paragraph [ref=e1426]:
        - strong [ref=e1427]: 1. Define the constraints first
        - text: "Before evaluating options, enumerate: team size, team skill set, existing tech stack, budget, timeline, scalability requirements, compliance needs. The \"right\" architecture changes dramatically based on these."
      - paragraph [ref=e1428]:
        - strong [ref=e1429]: 2. Use a Trade-off matrix
        - text: "For significant decisions (e.g., \"should we use GraphQL or REST?\"), I write a brief doc with:"
      - list [ref=e1430]:
        - listitem [ref=e1431]: "Context: why are we making this decision now?"
        - listitem [ref=e1432]: "Options: 2-4 realistic alternatives."
        - listitem [ref=e1433]: "Criteria: what matters (DX, performance, team familiarity, ecosystem maturity)?"
        - listitem [ref=e1434]: "Scoring: score each option against each criterion."
        - listitem [ref=e1435]: Recommendation + rationale.
      - paragraph [ref=e1436]:
        - strong [ref=e1437]: 3. Reversibility matters
        - text: "I categorize decisions as:"
      - list [ref=e1438]:
        - listitem [ref=e1439]:
          - strong [ref=e1440]: One-way doors
          - text: (hard to reverse — framework choice, state management architecture) → slow down, gather more input, prototype.
        - listitem [ref=e1441]:
          - strong [ref=e1442]: Two-way doors
          - text: (easy to reverse — folder structure, naming conventions) → decide and move. Don't over-engineer.
      - paragraph [ref=e1443]:
        - strong [ref=e1444]: 4. Prototype critical decisions
        - text: For one-way doors, build a small proof of concept before committing. A 2-day spike saves months of regret.
      - paragraph [ref=e1445]:
        - strong [ref=e1446]: 5. Document the decision (ADR)
        - text: "Record: what we decided, what we considered, why we chose this, what we accepted as trade-offs. Three months later, someone will ask \"why are we using X?\" and the ADR answers it."
      - paragraph [ref=e1447]:
        - strong [ref=e1448]: 6. Communicate and get buy-in
        - text: An architecture nobody follows is worthless. Present to the team, address concerns, and make sure they understand the "why." Engineers who understand the reasoning become advocates, not resistors.
      - paragraph [ref=e1449]:
        - strong [ref=e1450]: "Common trade-offs to be fluent in:"
      - list [ref=e1451]:
        - listitem [ref=e1452]: Developer experience vs. runtime performance (TypeScript adds build time but saves debugging time).
        - listitem [ref=e1453]: Flexibility vs. consistency (headless components vs. styled libraries).
        - listitem [ref=e1454]: Coupling vs. autonomy (shared library vs. copy-paste duplication between teams).
        - listitem [ref=e1455]: Speed to market vs. technical soundness (shortcuts now vs. re-platforming later).
      - separator [ref=e1456]
