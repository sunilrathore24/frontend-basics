      - heading "1. How Would You Design the Architecture for a Large-Scale Frontend Application?" [level=2] [ref=e482]
      - paragraph [ref=e483]:
        - strong [ref=e484]: "Why they ask:"
        - text: "This is the #1 question for architect roles. Interviewers want to see if you think beyond individual components and consider scalability, team collaboration, and long-term maintainability."
      - paragraph [ref=e485]:
        - strong [ref=e486]: "Model Answer:"
      - paragraph [ref=e487]: "I approach large-scale frontend architecture by first understanding the product scope, team size, and deployment model. Then I design in layers:"
      - paragraph [ref=e488]:
        - strong [ref=e489]: 1. Project Structure — Feature-based (not type-based)
      - code [ref=e491]: src/ features/ auth/ components/ hooks/ store/ api/ product/ cart/ shared/ components/ ← reusable design system components hooks/ utils/ app/ ← routing, providers, global config
      - paragraph [ref=e492]:
        - text: Feature-based structure ensures each team owns their domain without cross-polluting. Shared code lives in
        - code [ref=e493]: shared/
        - text: and is governed by architectural rules (no feature importing from another feature directly).
      - paragraph [ref=e494]:
        - strong [ref=e495]: 2. Layered Architecture
        - text: I separate the codebase into a presentation layer (components/pages), application layer (state management, use cases), and infrastructure layer (API clients, storage adapters). This keeps business logic framework-agnostic and testable.
      - paragraph [ref=e496]:
        - strong [ref=e497]: 3. State Management — Separate concerns
      - list [ref=e498]:
        - listitem [ref=e499]:
          - strong [ref=e500]: Server state
          - text: "(API data): TanStack Query — handles caching, background sync, stale-while-revalidate."
        - listitem [ref=e501]:
          - strong [ref=e502]: Global UI state
          - text: ": Zustand or Redux Toolkit — for auth, theme, notifications."
        - listitem [ref=e503]:
          - strong [ref=e504]: Local component state
          - text: ":"
          - code [ref=e505]: useState
          - text: ","
          - code [ref=e506]: useReducer
          - text: — keeps components self-contained.
      - paragraph [ref=e507]:
        - strong [ref=e508]: 4. Module Boundaries
        - text: Enforce strict import rules using ESLint plugins like
        - code [ref=e509]: eslint-plugin-boundaries
        - text: or Nx workspace boundaries. This prevents spaghetti dependencies.
      - paragraph [ref=e510]:
        - strong [ref=e511]: 5. Scalability Levers
      - list [ref=e512]:
        - listitem [ref=e513]:
          - text: Code splitting per route (
          - code [ref=e514]: React.lazy
          - text: + Suspense).
        - listitem [ref=e515]: Monorepo (Nx, Turborepo) for shared tooling, consistent versioning, and atomic commits across packages.
        - listitem [ref=e516]: A shared Design System as a separate npm package.
        - listitem [ref=e517]: If teams grow beyond ~8 frontend engineers per vertical, move to Micro-Frontends.
      - paragraph [ref=e518]:
        - strong [ref=e519]: "Talking points in the interview:"
      - list [ref=e520]:
        - listitem [ref=e521]: "Mention trade-offs: feature-based is harder to set up initially but pays off at scale."
        - listitem [ref=e522]: Ask the interviewer about team size — your architecture recommendation should change based on org size.
        - listitem [ref=e523]: Mention the "strangler fig pattern" for migrating legacy monoliths incrementally.
        - listitem [ref=e524]: The goal is to make the architecture scale with the team, not just the codebase. Optimize for developer velocity, independent deployability, and consistent UX.
      - separator [ref=e525]
      - heading "2. Explain Micro-Frontends — When to Use Them and How to Implement" [level=2] [ref=e526]
      - paragraph [ref=e527]:
        - strong [ref=e528]: "Why they ask:"
        - text: Micro-frontends are a senior/architect-level topic that tests both architectural thinking and awareness of organizational trade-offs.
      - paragraph [ref=e529]:
        - strong [ref=e530]: "Model Answer:"
      - paragraph [ref=e531]: Micro-frontends extend the microservices concept to the UI layer. Each team independently develops, deploys, and owns a slice of the frontend application.
      - paragraph [ref=e532]:
        - strong [ref=e533]: "When to use:"
      - list [ref=e534]:
        - listitem [ref=e535]: Team size > 30 frontend engineers or 3+ teams on the same product.
        - listitem [ref=e536]: Multiple teams causing release bottlenecks in a monolith.
        - listitem [ref=e537]: Different parts of the app have very different tech stacks or release cadences.
        - listitem [ref=e538]: You need independent deployability (e.g., checkout team deploys 5x/day, marketing team deploys weekly).
        - listitem [ref=e539]: Migrating a legacy app incrementally (strangler fig pattern).
      - paragraph [ref=e540]:
        - strong [ref=e541]: "When to avoid:"
      - list [ref=e542]:
        - listitem [ref=e543]: Small teams (< 10 developers) — the overhead isn't worth it.
        - listitem [ref=e544]: Greenfield projects where a well-structured monolith would be simpler.
        - listitem [ref=e545]: Tightly coupled features that share a lot of state.
        - listitem [ref=e546]: When you lack platform engineering capacity to maintain the shell/orchestrator.
      - paragraph [ref=e547]:
        - strong [ref=e548]: "Implementation approaches:"
