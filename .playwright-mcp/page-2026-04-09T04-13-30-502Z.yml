      - paragraph [ref=e1517]:
        - emphasis [ref=e1518]: Good luck with your interviews! For architect roles, interviewers evaluate your thinking process and ability to articulate trade-offs as much as the specific answers. Lead with the "why", show you understand the trade-offs, and always tie your answer back to team scale and business impact.