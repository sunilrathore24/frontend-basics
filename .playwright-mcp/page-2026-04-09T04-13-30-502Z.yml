      - paragraph [ref=e585]:
        - strong [ref=e586]: "Trade-offs to always mention:"
      - list [ref=e587]:
        - listitem [ref=e588]:
          - strong [ref=e589]: "Pros:"
          - text: Team autonomy, independent deployments, isolated tech decisions.
        - listitem [ref=e590]:
          - strong [ref=e591]: "Cons:"
          - text: Shared state is harder, CSS conflicts, duplicate dependencies (bundle bloat), more DevOps overhead.
        - listitem [ref=e592]:
          - strong [ref=e593]: "Mitigations:"
          - text: Shared design system, thin shell app for routing/auth, strict contracts between micro-apps.
        - listitem [ref=e594]:
          - strong [ref=e595]: "Rule:"
          - text: Don't do it unless your org is genuinely feeling the pain of a monolith.
