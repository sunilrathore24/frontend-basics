      - heading "2. Change Detection" [level=2] [ref=e418]
      - 'heading "Q2.1: Explain Angular change detection in detail" [level=3] [ref=e419]'
      - paragraph [ref=e420]:
        - strong [ref=e421]: "Architect-Level Answer:"
      - paragraph [ref=e422]: Angular's change detection is the mechanism that synchronizes the application state with the UI. It checks for changes in component properties and updates the DOM accordingly.
      - paragraph [ref=e423]:
        - strong [ref=e424]: 1. Change Detection Flow
      - code [ref=e426]: User Event / Async Operation ↓ Zone.js intercepts ↓ Angular Change Detection triggered ↓ Component Tree traversal (top-down) ↓ Check bindings for changes ↓ Update DOM if changed
      - paragraph [ref=e427]:
        - strong [ref=e428]: 2. When Change Detection Runs
      - code [ref=e430]: "// Triggers change detection: // 1. User events <button (click)=\"increment()\">Click</button> // 2. HTTP requests this.http.get('/api/users').subscribe(users => { this.users = users; // CD runs after subscription }); // 3. Timers setTimeout(() => { this.message = 'Updated'; // CD runs after timeout }, 1000); // 4. Manual trigger this.cdr.detectChanges(); this.cdr.markForCheck();"
      - paragraph [ref=e431]:
        - strong [ref=e432]: 3. Change Detection Strategies
      - paragraph [ref=e433]:
        - strong [ref=e434]: Default Strategy
        - text: "- Checks entire component tree"
      - code [ref=e436]:
        - generic [ref=e437]: "@Component"
        - text: "({ selector: 'app-user-list', changeDetection: ChangeDetectionStrategy.Default, // Default template:"
        - generic [ref=e438]: "` <div *ngFor=\"let user of users\"> {{ user.name }} - {{ getStatus(user) }} </div> `"
        - text: "}) export class UserListComponent { users: User[] = []; // Called on EVERY change detection cycle getStatus(user: User): string { console.log('getStatus called'); // Logs many times! return user.active ? 'Active' : 'Inactive'; } updateUser(user: User) { user.name = 'Updated'; // Mutation detected } }"
      - paragraph [ref=e439]:
        - strong [ref=e440]: OnPush Strategy
        - text: "- Checks only when inputs change"
      - code [ref=e442]:
        - generic [ref=e443]: "@Component"
        - text: "({ selector: 'app-user-card', changeDetection: ChangeDetectionStrategy.OnPush, template:"
        - generic [ref=e444]: "` <div> {{ user.name }} <button (click)=\"update()\">Update</button> </div> `"
        - text: "}) export class UserCardComponent {"
        - generic [ref=e445]: "@Input"
        - text: "() user: User; // Only checks when this reference changes constructor(private cdr: ChangeDetectorRef) {} update() { // ❌ Won't trigger CD (mutation) this.user.name = 'Updated'; // ✅ Triggers CD (new reference) this.user = { ...this.user, name: 'Updated' }; // ✅ Manual trigger this.cdr.markForCheck(); } }"
      - paragraph [ref=e446]:
        - strong [ref=e447]: 4. Change Detection Tree Traversal
      - code [ref=e449]:
        - generic [ref=e450]: "@Component"
        - text: "({ selector: 'app-root', template:"
        - generic [ref=e451]: "` <app-header></app-header> <app-content [data]=\"data\"></app-content> <app-footer></app-footer> `"
        - text: "}) export class AppComponent { data = { count: 0 }; increment() { // Default: Checks AppComponent + Header + Content + Footer this.data.count++; // OnPush: Only checks components with changed inputs this.data = { count: this.data.count + 1 }; } }"
      - paragraph [ref=e452]:
        - strong [ref=e453]: 5. ChangeDetectorRef API
      - code [ref=e455]: "export class OptimizedComponent implements OnInit, OnDestroy { constructor(private cdr: ChangeDetectorRef) {} ngOnInit() { // Detach from change detection tree this.cdr.detach(); // Manual updates interval(1000).pipe( takeUntil(this.destroy$) ).subscribe(() => { this.updateData(); this.cdr.detectChanges(); // Run CD for this component only }); } // Mark for check in next CD cycle onDataReceived() { this.cdr.markForCheck(); } // Reattach to CD tree enableAutoDetection() { this.cdr.reattach(); } }"
      - paragraph [ref=e456]:
        - strong [ref=e457]: 6. Zone.js Role
      - code [ref=e459]: "// Zone.js patches async APIs // Before Zone.js const originalSetTimeout = window.setTimeout; window.setTimeout = function(callback, delay) { return originalSetTimeout(() => { callback(); // Angular doesn't know about this }, delay); }; // With Zone.js window.setTimeout = function(callback, delay) { return originalSetTimeout(() => { callback(); Zone.current.run(() => { // Angular triggers change detection here ApplicationRef.tick(); }); }, delay); };"
      - paragraph [ref=e460]:
        - strong [ref=e461]: 7. Performance Optimization Patterns
      - code [ref=e463]:
        - generic [ref=e464]: "@Component"
        - text: "({ selector: 'app-dashboard', changeDetection: ChangeDetectionStrategy.OnPush, template:"
        - generic [ref=e465]: "` <!-- ✅ Async pipe - auto unsubscribe --> <div *ngFor=\"let user of users$ | async; trackBy: trackById\"> {{ user.name }} </div> <!-- ✅ Pure pipe - cached --> <p>{{ data | expensiveTransform }}</p> <!-- ❌ Method call - runs every CD --> <p>{{ calculateTotal() }}</p> <!-- ✅ Property - calculated once --> <p>{{ total }}</p> `"
        - text: "}) export class DashboardComponent { users$ = this.userService.getUsers(); private _data: Data[]; private _total: number;"
        - generic [ref=e466]: "@Input"
        - text: "() set data(value: Data[]) { this._data = value; this._total = this.calculateTotal(); // Calculate once } get total() { return this._total; } trackById(index: number, user: User) { return user.id; // Prevents unnecessary re-renders } }"
      - paragraph [ref=e467]:
        - strong [ref=e468]: 8. Debugging Change Detection
      - code [ref=e470]: "import { ApplicationRef } from '@angular/core'; export class DebugComponent { constructor(private appRef: ApplicationRef) { // Log every CD cycle this.appRef.isStable.subscribe(stable => { console.log('Change detection stable:', stable); }); } // Enable Angular DevTools profiler ngAfterViewInit() { if (typeof ng !== 'undefined') { ng.profiler.timeChangeDetection(); } } }"
      - paragraph [ref=e471]:
        - strong [ref=e472]: SailPoint Context
        - text: ": In identity management dashboards with thousands of users:"
      - list [ref=e473]:
        - listitem [ref=e474]: Use OnPush for user cards to prevent unnecessary checks
        - listitem [ref=e475]: Implement trackBy for large lists of identities
        - listitem [ref=e476]: Detach CD for real-time widgets that update frequently
        - listitem [ref=e477]: Use async pipe for observable streams from backend
