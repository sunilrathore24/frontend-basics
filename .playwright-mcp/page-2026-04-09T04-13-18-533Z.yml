      - heading "2. Change Detection" [level=2] [ref=e417]
      - 'heading "Q2.1: Explain Angular change detection in detail" [level=3] [ref=e418]'
      - paragraph [ref=e419]:
        - strong [ref=e420]: "Architect-Level Answer:"
      - paragraph [ref=e421]: Angular's change detection is the mechanism that synchronizes the application state with the UI. It checks for changes in component properties and updates the DOM accordingly.
      - paragraph [ref=e422]:
        - strong [ref=e423]: 1. Change Detection Flow
      - code [ref=e425]: User Event / Async Operation ↓ Zone.js intercepts ↓ Angular Change Detection triggered ↓ Component Tree traversal (top-down) ↓ Check bindings for changes ↓ Update DOM if changed
      - paragraph [ref=e426]:
        - strong [ref=e427]: 2. When Change Detection Runs
      - code [ref=e429]: "// Triggers change detection: // 1. User events <button (click)=\"increment()\">Click</button> // 2. HTTP requests this.http.get('/api/users').subscribe(users => { this.users = users; // CD runs after subscription }); // 3. Timers setTimeout(() => { this.message = 'Updated'; // CD runs after timeout }, 1000); // 4. Manual trigger this.cdr.detectChanges(); this.cdr.markForCheck();"
      - paragraph [ref=e430]:
        - strong [ref=e431]: 3. Change Detection Strategies
      - paragraph [ref=e432]:
        - strong [ref=e433]: Default Strategy
        - text: "- Checks entire component tree"
      - code [ref=e435]:
        - generic [ref=e436]: "@Component"
        - text: "({ selector: 'app-user-list', changeDetection: ChangeDetectionStrategy.Default, // Default template:"
        - generic [ref=e437]: "` <div *ngFor=\"let user of users\"> {{ user.name }} - {{ getStatus(user) }} </div> `"
        - text: "}) export class UserListComponent { users: User[] = []; // Called on EVERY change detection cycle getStatus(user: User): string { console.log('getStatus called'); // Logs many times! return user.active ? 'Active' : 'Inactive'; } updateUser(user: User) { user.name = 'Updated'; // Mutation detected } }"
      - paragraph [ref=e438]:
        - strong [ref=e439]: OnPush Strategy
        - text: "- Checks only when inputs change"
      - code [ref=e441]:
        - generic [ref=e442]: "@Component"
        - text: "({ selector: 'app-user-card', changeDetection: ChangeDetectionStrategy.OnPush, template:"
        - generic [ref=e443]: "` <div> {{ user.name }} <button (click)=\"update()\">Update</button> </div> `"
        - text: "}) export class UserCardComponent {"
        - generic [ref=e444]: "@Input"
        - text: "() user: User; // Only checks when this reference changes constructor(private cdr: ChangeDetectorRef) {} update() { // ❌ Won't trigger CD (mutation) this.user.name = 'Updated'; // ✅ Triggers CD (new reference) this.user = { ...this.user, name: 'Updated' }; // ✅ Manual trigger this.cdr.markForCheck(); } }"
      - paragraph [ref=e445]:
        - strong [ref=e446]: 4. Change Detection Tree Traversal
      - code [ref=e448]:
        - generic [ref=e449]: "@Component"
        - text: "({ selector: 'app-root', template:"
        - generic [ref=e450]: "` <app-header></app-header> <app-content [data]=\"data\"></app-content> <app-footer></app-footer> `"
        - text: "}) export class AppComponent { data = { count: 0 }; increment() { // Default: Checks AppComponent + Header + Content + Footer this.data.count++; // OnPush: Only checks components with changed inputs this.data = { count: this.data.count + 1 }; } }"
      - paragraph [ref=e451]:
        - strong [ref=e452]: 5. ChangeDetectorRef API
      - code [ref=e454]: "export class OptimizedComponent implements OnInit, OnDestroy { constructor(private cdr: ChangeDetectorRef) {} ngOnInit() { // Detach from change detection tree this.cdr.detach(); // Manual updates interval(1000).pipe( takeUntil(this.destroy$) ).subscribe(() => { this.updateData(); this.cdr.detectChanges(); // Run CD for this component only }); } // Mark for check in next CD cycle onDataReceived() { this.cdr.markForCheck(); } // Reattach to CD tree enableAutoDetection() { this.cdr.reattach(); } }"
      - paragraph [ref=e455]:
        - strong [ref=e456]: 6. Zone.js Role
      - code [ref=e458]: "// Zone.js patches async APIs // Before Zone.js const originalSetTimeout = window.setTimeout; window.setTimeout = function(callback, delay) { return originalSetTimeout(() => { callback(); // Angular doesn't know about this }, delay); }; // With Zone.js window.setTimeout = function(callback, delay) { return originalSetTimeout(() => { callback(); Zone.current.run(() => { // Angular triggers change detection here ApplicationRef.tick(); }); }, delay); };"
      - paragraph [ref=e459]:
        - strong [ref=e460]: 7. Performance Optimization Patterns
      - code [ref=e462]:
        - generic [ref=e463]: "@Component"
        - text: "({ selector: 'app-dashboard', changeDetection: ChangeDetectionStrategy.OnPush, template:"
        - generic [ref=e464]: "` <!-- ✅ Async pipe - auto unsubscribe --> <div *ngFor=\"let user of users$ | async; trackBy: trackById\"> {{ user.name }} </div> <!-- ✅ Pure pipe - cached --> <p>{{ data | expensiveTransform }}</p> <!-- ❌ Method call - runs every CD --> <p>{{ calculateTotal() }}</p> <!-- ✅ Property - calculated once --> <p>{{ total }}</p> `"
        - text: "}) export class DashboardComponent { users$ = this.userService.getUsers(); private _data: Data[]; private _total: number;"
        - generic [ref=e465]: "@Input"
        - text: "() set data(value: Data[]) { this._data = value; this._total = this.calculateTotal(); // Calculate once } get total() { return this._total; } trackById(index: number, user: User) { return user.id; // Prevents unnecessary re-renders } }"
      - paragraph [ref=e466]:
        - strong [ref=e467]: 8. Debugging Change Detection
      - code [ref=e469]: "import { ApplicationRef } from '@angular/core'; export class DebugComponent { constructor(private appRef: ApplicationRef) { // Log every CD cycle this.appRef.isStable.subscribe(stable => { console.log('Change detection stable:', stable); }); } // Enable Angular DevTools profiler ngAfterViewInit() { if (typeof ng !== 'undefined') { ng.profiler.timeChangeDetection(); } } }"
      - paragraph [ref=e470]:
        - strong [ref=e471]: SailPoint Context
        - text: ": In identity management dashboards with thousands of users:"
      - list [ref=e472]:
        - listitem [ref=e473]: Use OnPush for user cards to prevent unnecessary checks
        - listitem [ref=e474]: Implement trackBy for large lists of identities
        - listitem [ref=e475]: Detach CD for real-time widgets that update frequently
        - listitem [ref=e476]: Use async pipe for observable streams from backend
