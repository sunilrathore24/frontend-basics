        - strong [ref=e332]: A. Pure Pipes
        - text: (Default - Cached)
      - code [ref=e334]:
        - generic [ref=e335]: "@Pipe"
        - text: "({ name: 'userStatus', pure: true, // Default standalone: true }) export class UserStatusPipe implements PipeTransform { transform(user: User, showIcon: boolean = false): string { const status = user.active ? 'Active' : 'Inactive'; const icon = showIcon ? (user.active ? '✓' : '✗') : ''; return"
        - generic [ref=e336]:
          - text: "`"
          - generic [ref=e337]: "${icon}"
          - generic [ref=e338]: "${status}"
          - text: "`"
        - text: "; } } // Usage <p>{{ user | userStatus:true }}</p>"
      - paragraph [ref=e339]:
        - strong [ref=e340]: B. Impure Pipes
        - text: (Runs every change detection)
      - code [ref=e342]:
        - generic [ref=e343]: "@Pipe"
        - text: "({ name: 'filterByRole', pure: false, // Runs on every CD cycle standalone: true }) export class FilterByRolePipe implements PipeTransform { transform(users: User[], role: string): User[] { if (!role) return users; return users.filter(user => user.roles.includes(role)); } } // Usage - filters array on every change <div *ngFor=\"let user of users | filterByRole:selectedRole\"> {{ user.name }} </div>"
      - paragraph [ref=e344]:
        - strong [ref=e345]: C. Async Pipe
        - text: (Built-in, handles subscriptions)
      - code [ref=e347]: "export class UserListComponent { users$ = this.userService.getUsers(); constructor(private userService: UserService) {} } // Template - auto subscribe/unsubscribe <div *ngFor=\"let user of users$ | async\"> {{ user.name }} </div>"
